<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elton Santos | Backend Developer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicon@latest/devicon.min.css">

    <script>
        window.tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b1120',
                        cardBg: '#1e293b',
                        dotnetBlue: '#512bd4',
                        pythonGreen: '#3776ab'
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth;}
        .glass { background: rgba(11, 17, 32, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>

<body class="bg-darkBg text-slate-300 font-sans">

<!-- HEADER -->
<header class="fixed w-full top-0 z-50 glass border-b border-slate-800">
    <nav class="max-w-6xl mx-auto px-4 py-4 flex justify-between">
        <span class="text-white font-bold">
            ELTON <span class="text-dotnetBlue">SANTOS</span>
        </span>

        <div class="flex gap-4 text-sm uppercase">
            <a href="#sobre">Sobre</a>
            <a href="#projetos">Projetos</a>
            <a href="#ia-assistente">IA</a>
            <a href="#contato">Contato</a>
        </div>
    </nav>
</header>

<!-- HERO -->
<section class="pt-32 text-center">
    <h1 class="text-5xl text-white font-bold">
        Dev <span class="text-dotnetBlue">Backend</span>
    </h1>
</section>

<!-- IA -->
<section id="ia-assistente" class="py-20">
    <div class="max-w-3xl mx-auto">

        <input id="userInput"
            class="w-full p-4 bg-slate-800 rounded"
            placeholder="Pergunte algo..." />

        <button onclick="perguntarIA()"
            class="mt-3 px-6 py-3 bg-dotnetBlue text-white rounded">
            Perguntar
        </button>

        <div id="aiResponse" class="mt-6 hidden">
            <p id="responseText"></p>
        </div>
    </div>
</section>

<script>
// =======================
// DIGITAÇÃO (EFEITO CHATGPT)
// =======================
function digitarTexto(elemento, texto) {
    let i = 0;
    elemento.innerText = "";

    function escrever() {
        if (i < texto.length) {
            elemento.innerText += texto.charAt(i);
            i++;
            setTimeout(escrever, 15);
        }
    }

    escrever();
}

// =======================
// ENTER PARA ENVIAR
// =======================
document.getElementById('userInput')
.addEventListener('keypress', e => {
    if (e.key === 'Enter') perguntarIA();
});

// =======================
// CHAT IA
// =======================
async function perguntarIA() {

    const input = document.getElementById('userInput');
    const textDiv = document.getElementById('responseText');
    const responseDiv = document.getElementById('aiResponse');

    const pergunta = input.value.trim();
    if (!pergunta) return;

    responseDiv.classList.remove('hidden');

    // LOADING
    textDiv.innerText = "Pensando";
    let dots = 0;

    const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        textDiv.innerText = "Pensando" + ".".repeat(dots);
    }, 400);

    input.value = "";

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensagem: pergunta })
        });

        const data = await res.json();

        clearInterval(interval);

        if (!res.ok) {
            digitarTexto(textDiv, data.resposta || "Erro");
            return;
        }

        digitarTexto(textDiv, data.resposta);

    } catch {
        clearInterval(interval);
        digitarTexto(textDiv, "Erro de conexão");
    }
}
</script>

</body>
</html>
