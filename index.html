<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elton Santos | Backend Developer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicon@latest/devicon.min.css">

    <script>
        window.tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b1120',
                        cardBg: '#1e293b',
                        dotnetBlue: '#512bd4',
                        pythonGreen: '#3776ab'
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        .glass { background: rgba(11, 17, 32, 0.8); backdrop-filter: blur(12px); }
        .glow-effect { box-shadow: 0 0 20px rgba(81, 43, 212, 0.3); }
    </style>
</head>

<body class="bg-darkBg text-slate-300 font-sans antialiased">

<header class="fixed w-full top-0 z-50 glass border-b border-slate-800">
    <nav class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <span class="text-lg md:text-xl font-bold text-white tracking-tighter">
            ELTON <span class="text-dotnetBlue">SANTOS</span>
        </span>

        <div class="flex space-x-3 md:space-x-8 text-xs md:text-sm uppercase">
            <a href="#sobre">Sobre</a>
            <a href="#projetos">Projetos</a>
            <a href="#ia-assistente">IA</a>
            <a href="#contato">Contato</a>
        </div>
    </nav>
</header>

<section class="pt-32 text-center">
    <h1 class="text-5xl text-white font-bold">
        Dev <span class="text-dotnetBlue">Backend</span>
    </h1>
</section>

<!-- IA -->
<section id="ia-assistente" class="py-20">
    <div class="max-w-3xl mx-auto">

        <input id="userInput"
            class="w-full p-4 bg-slate-800 rounded"
            placeholder="Pergunte algo..." />

        <button onclick="perguntarIA()"
            class="mt-3 px-6 py-3 bg-dotnetBlue text-white rounded">
            Perguntar
        </button>

        <div id="aiResponse" class="mt-6 hidden">
            <p id="responseText"></p>
        </div>
    </div>
</section>

<script>
// =======================
// ENTER PARA ENVIAR
// =======================
document.getElementById('userInput')
.addEventListener('keypress', e => {
    if (e.key === 'Enter') perguntarIA();
});

// =======================
// CHAT IA SIMPLES
// =======================
async function perguntarIA() {

    const input = document.getElementById('userInput');
    const textDiv = document.getElementById('responseText');
    const responseDiv = document.getElementById('aiResponse');

    const pergunta = input.value.trim();
    if (!pergunta) return;

    responseDiv.classList.remove('hidden');
    textDiv.innerText = "Carregando...";

    input.value = "";

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensagem: pergunta })
        });

        const data = await res.json();

        if (!res.ok) {
            textDiv.innerText = data.resposta || "Erro";
            return;
        }

        textDiv.innerText = data.resposta;

    } catch (err) {
        console.error(err);
        textDiv.innerText = "Erro ao conectar com o servidor.";
    }
}
</script>

</body>
</html>
